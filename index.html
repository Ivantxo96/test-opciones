<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fundamentos de Opciones Financieras · Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f9f8f6;
    --surface: #ffffff;
    --surface-2: #f3f2ef;
    --border: #e4e2dc;
    --text-primary: #1a1916;
    --text-secondary: #6b6860;
    --text-muted: #9c9a94;
    --accent: #4339a8;
    --accent-light: #eeecfc;
    --accent-dark: #2f2879;
    --correct-bg: #e6f5ef;
    --correct-border: #1d9e75;
    --correct-text: #0a5c43;
    --wrong-bg: #fceaea;
    --wrong-border: #d64545;
    --wrong-text: #8c1c1c;
    --radius: 10px;
    --radius-sm: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110;
      --surface: #1c1b19;
      --surface-2: #242320;
      --border: #2e2d2a;
      --text-primary: #f0ede8;
      --text-secondary: #9c9a94;
      --text-muted: #6b6860;
      --accent: #7c72e8;
      --accent-light: #1e1c3a;
      --accent-dark: #a49cf0;
      --correct-bg: #0d2c20;
      --correct-border: #1d9e75;
      --correct-text: #5ecba5;
      --wrong-bg: #2c1010;
      --wrong-border: #c44;
      --wrong-text: #f08080;
    }
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }

  .page-shell {
    max-width: 680px;
    margin: 0 auto;
    padding: 2.5rem 1.25rem 4rem;
  }

  /* Header */
  .site-header {
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .site-header h1 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    margin-bottom: 0.3rem;
  }
  .site-header p {
    font-size: 0.875rem;
    color: var(--text-secondary);
  }
  .badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--accent-light);
    color: var(--accent);
    letter-spacing: 0.02em;
    margin-bottom: 0.75rem;
  }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 4px;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.35s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }
  .progress-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* Block label */
  .block-eyebrow {
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  /* Question card */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    animation: fadeUp 0.2s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .q-meta {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 0.6rem;
  }
  .q-text {
    font-size: 0.975rem;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.55;
    margin-bottom: 1.1rem;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 7px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 9px 13px;
    cursor: pointer;
    font-size: 0.875rem;
    color: var(--text-primary);
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    line-height: 1.45;
    width: 100%;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .opt:disabled { cursor: default; }
  .opt.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent-dark); }
  .opt.correct { border-color: var(--correct-border); background: var(--correct-bg); color: var(--correct-text); }
  .opt.wrong { border-color: var(--wrong-border); background: var(--wrong-bg); color: var(--wrong-text); }
  .opt.show-correct { border-color: var(--correct-border); background: var(--correct-bg); color: var(--correct-text); }
  .opt-letter {
    font-weight: 600;
    font-size: 0.75rem;
    min-width: 18px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  /* Nav */
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 1rem;
    gap: 10px;
  }
  .btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 18px;
    font-size: 0.875rem;
    color: var(--text-primary);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.12s, border-color 0.12s;
  }
  .btn:hover { background: var(--surface-2); border-color: var(--text-muted); }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }
  .btn.primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .q-counter { font-size: 0.8rem; color: var(--text-muted); }

  /* Score screen */
  .score-screen { animation: fadeUp 0.25s ease both; }
  .score-hero {
    text-align: center;
    padding: 2.5rem 1rem 2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1rem;
  }
  .score-pct { font-size: 3.5rem; font-weight: 600; color: var(--accent); line-height: 1; letter-spacing: -0.03em; }
  .score-msg { font-size: 0.95rem; color: var(--text-secondary); margin-top: 0.4rem; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin: 1.25rem 0;
  }
  .stat-card {
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 12px 10px;
    text-align: center;
  }
  .stat-val { font-size: 1.4rem; font-weight: 600; }
  .stat-lbl { font-size: 0.7rem; color: var(--text-secondary); margin-top: 2px; }
  .val-green { color: var(--correct-text); }
  .val-red { color: var(--wrong-text); }
  .score-actions { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 1rem; }

  /* Share box */
  .share-box {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.875rem 1rem;
    margin-top: 0.875rem;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.8rem;
    color: var(--text-secondary);
  }
  .copy-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px 13px;
    font-size: 0.75rem;
    cursor: pointer;
    color: var(--text-primary);
    font-family: inherit;
    white-space: nowrap;
    transition: background 0.12s;
  }
  .copy-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

  /* Review mode tag */
  .review-notice {
    background: var(--accent-light);
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    font-size: 0.8rem;
    color: var(--accent-dark);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  @media (max-width: 480px) {
    .site-header h1 { font-size: 1.25rem; }
    .q-card { padding: 1.1rem; }
    .score-pct { font-size: 2.8rem; }
    .score-actions { flex-direction: column; align-items: stretch; }
    .btn { text-align: center; }
  }
</style>
</head>
<body>
<div class="page-shell">

  <header class="site-header">
    <div class="badge">Nivel básico</div>
    <h1>Fundamentos de opciones financieras</h1>
    <p>22 preguntas · 6 bloques temáticos</p>
  </header>

  <div class="progress-row">
    <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    <span class="progress-label" id="prog-label">0 / 22</span>
  </div>

  <div id="review-notice" style="display:none" class="review-notice">
    <span>Modo revisión — tus respuestas están bloqueadas</span>
    <button class="copy-btn" onclick="retryQuiz()">Reintentar desde 0</button>
  </div>

  <div id="q-container"></div>

  <div class="nav-row" id="nav-row">
    <button class="btn" id="prev-btn" onclick="prevQ()" disabled>← Anterior</button>
    <span class="q-counter" id="q-counter">1 / 22</span>
    <button class="btn primary" id="next-btn" onclick="nextQ()">Siguiente →</button>
  </div>

  <div id="score-screen" style="display:none"></div>

</div>

<script>
const QUESTIONS = [
  {block:"Bloque 1 · Conceptos clave y definiciones",q:"¿Qué es una opción financiera?",opts:["Un contrato de futuros avanzado","Un contrato que da el derecho, pero no la obligación, de comprar o vender un activo a un precio fijado","Una acción de una empresa tecnológica","Un tipo de préstamo bancario a corto plazo"],ans:1},
  {block:null,q:"¿Cómo se conoce al activo sobre el cual se emite el contrato de opción (por ejemplo, una acción o un índice)?",opts:["Activo subyacente","Activo de cobertura","Activo de prima","Activo de ejercicio"],ans:0},
  {block:null,q:"¿Qué representa el \"Precio de Ejercicio\" (Strike Price)?",opts:["El precio actual de la acción en el mercado","El precio máximo que ha alcanzado la opción en el día","El precio estipulado al que se puede comprar o vender el activo subyacente","La comisión que se le paga al bróker"],ans:2},
  {block:null,q:"¿Qué es la \"Prima\" en un contrato de opciones?",opts:["El beneficio neto que obtiene el comprador al final del contrato","El precio o coste que paga el comprador al vendedor por adquirir el derecho de la opción","La fecha en la que expira el contrato","Un recargo por pagar tarde"],ans:1},
  {block:"Bloque 2 · Opciones Call y Put",q:"Si compras una opción Call, estás adquiriendo el derecho a:",opts:["Vender un activo a un precio fijo","Comprar un activo a un precio fijo en una fecha determinada","Intercambiar una divisa por otra","Cancelar el contrato sin penalización"],ans:1},
  {block:null,q:"Si compras una opción Put, estás adquiriendo el derecho a:",opts:["Vender un activo a un precio fijo en una fecha determinada","Comprar un activo a un precio fijo","Recibir dividendos anticipados","Duplicar tu inversión inicial"],ans:0},
  {block:null,q:"¿Cuál es la expectativa de mercado de un comprador de una opción Call?",opts:["Que el precio del activo subyacente baje con fuerza","Que el precio del activo subyacente se mantenga completamente plano","Que el precio del activo subyacente suba","Que el mercado cierre por vacaciones"],ans:2},
  {block:null,q:"¿Cuál es la expectativa de mercado de un comprador de una opción Put?",opts:["Que el precio del activo subyacente suba de forma parabólica","Que el precio del activo subyacente baje","Que aumenten los tipos de interés drásticamente","No le importa el movimiento del precio"],ans:1},
  {block:"Bloque 3 · Estilos de ejercicio y vencimiento",q:"¿Qué diferencia principal tiene una opción de \"Estilo Americano\"?",opts:["Solo se puede negociar en la bolsa de Nueva York","Se puede ejercer en cualquier momento antes o en la misma fecha de vencimiento","Se cotiza exclusivamente en dólares","Su fecha de vencimiento es obligatoriamente a final de año"],ans:1},
  {block:null,q:"¿Qué caracteriza a una opción de \"Estilo Europeo\"?",opts:["Solo se puede ejercer exactamente en la fecha de vencimiento","Solo se puede comprar si eres residente en Europa","Se puede ejercer cualquier día de la semana excepto los domingos","No tiene fecha de vencimiento"],ans:0},
  {block:null,q:"¿Qué ocurre con el valor temporal de una opción a medida que se acerca su fecha de vencimiento?",opts:["Aumenta exponencialmente","Se mantiene exactamente igual","Disminuye (sufre un efecto de erosión temporal o theta decay)","Se duplica el último día"],ans:2},
  {block:"Bloque 4 · Moneyness",q:"Si una opción Call tiene un precio de ejercicio de 50 € y la acción subyacente cotiza a 60 €, la opción está:",opts:["Out of the Money (OTM)","At the Money (ATM)","In the Money (ITM)","Broken (Rota)"],ans:2},
  {block:null,q:"Si una opción Put tiene un precio de ejercicio de 40 € y la acción cotiza a 50 €, esta opción está:",opts:["In the Money (ITM)","Out of the Money (OTM)","At the Money (ATM)","En equilibrio perfecto"],ans:1},
  {block:null,q:"Una opción se considera \"At the Money\" (ATM) cuando:",opts:["El precio de ejercicio es mucho mayor que el precio de la acción","El precio de ejercicio es igual o muy cercano al precio del activo subyacente","La prima de la opción ha caído a cero","El bróker no cobra comisiones por operarla"],ans:1},
  {block:"Bloque 5 · Perfiles de riesgo y rendimiento",q:"Para el comprador de una opción (Call o Put), el riesgo máximo de pérdida es:",opts:["Ilimitado","Cero, nunca se puede perder dinero","Limitado estrictamente al valor de la prima pagada","Igual al precio de ejercicio del activo"],ans:2},
  {block:null,q:"Para el vendedor de una opción Call descubierta (sin tener las acciones), el riesgo potencial es:",opts:["Limitado a la prima","Teóricamente ilimitado, ya que el precio de la acción puede subir indefinidamente","Fijo y conocido desde el principio","Ninguno, vender opciones siempre es seguro"],ans:1},
  {block:null,q:"Si realizas una estrategia de compra de Put (Long Put), tu beneficio potencial máximo es:",opts:["Limitado estrictamente a la prima recibida","Ilimitado hacia el infinito","Sustancial pero limitado, ya que el precio de la acción no puede caer por debajo de cero","Cero, la compra de Put solo se usa para perder dinero"],ans:2},
  {block:null,q:"Para el vendedor de una opción Put (Short Put), el riesgo máximo ocurre si el precio de la acción cae a cero y el beneficio está limitado a:",opts:["La prima que pagó inicialmente","Prima cobrada","Un valor infinito","La pérdida es asumida en su totalidad por la bolsa de valores"],ans:1},
  {block:null,q:"¿Quién asume la obligación en un contrato de opciones?",opts:["El comprador (long)","El vendedor (short / escritor de la opción)","El regulador del mercado","Ambas partes por igual"],ans:1},
  {block:"Bloque 6 · Aplicación práctica y cobertura",q:"Si un inversor posee 100 acciones de una empresa y teme que vayan a caer a corto plazo, ¿qué estrategia básica con opciones podría usar como seguro?",opts:["Comprar una opción Call","Vender una opción Call","Comprar una opción Put (Put protectora)","Cerrar su cuenta de corretaje"],ans:2},
  {block:null,q:"Por lo general, ¿a cuántas acciones del activo subyacente equivale un contrato de opción estándar en el mercado de acciones?",opts:["1 acción","10 acciones","100 acciones","1.000 acciones"],ans:2},
  {block:null,q:"¿Qué componente NO forma parte del valor de la prima de una opción?",opts:["Los tipos de interés de mercado","El tiempo restante hasta el vencimiento","La volatilidad implícita del mercado","El tamaño de la empresa"],ans:3}
];

const LETTERS = ["A","B","C","D"];
let current = 0;
let answers = new Array(QUESTIONS.length).fill(null);
let reviewMode = false;

function render() {
  const q = QUESTIONS[current];
  const container = document.getElementById("q-container");
  const isAnswered = answers[current] !== null;

  let blockHtml = q.block ? `<div class="block-eyebrow">${q.block}</div>` : "";

  const optsHtml = q.opts.map((o, i) => {
    let cls = "opt";
    let disabled = isAnswered || reviewMode ? "disabled" : "";
    if (isAnswered) {
      if (i === answers[current] && answers[current] === q.ans) cls += " correct";
      else if (i === answers[current]) cls += " wrong";
      else if (i === q.ans) cls += " show-correct";
    }
    return `<button class="${cls}" ${disabled} onclick="select(${i})">
      <span class="opt-letter">${LETTERS[i]}</span>
      <span>${o}</span>
    </button>`;
  }).join("");

  container.innerHTML = `
    ${blockHtml}
    <div class="q-card">
      <div class="q-meta">Pregunta ${current + 1} de ${QUESTIONS.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
    </div>`;

  document.getElementById("q-counter").textContent = `${current + 1} / ${QUESTIONS.length}`;

  const answered = answers.filter(a => a !== null).length;
  document.getElementById("prog-fill").style.width = Math.round((answered / QUESTIONS.length) * 100) + "%";
  document.getElementById("prog-label").textContent = answered + " / " + QUESTIONS.length;

  document.getElementById("prev-btn").disabled = current === 0;
  const nextBtn = document.getElementById("next-btn");
  const isLast = current === QUESTIONS.length - 1;
  nextBtn.textContent = isLast ? (reviewMode ? "Ver resultado →" : "Ver resultado →") : "Siguiente →";

  document.getElementById("review-notice").style.display = reviewMode ? "flex" : "none";
}

function select(i) {
  if (answers[current] !== null || reviewMode) return;
  answers[current] = i;
  render();
}

function nextQ() {
  if (current < QUESTIONS.length - 1) { current++; render(); }
  else showScore();
}

function prevQ() {
  if (current > 0) { current--; render(); }
}

function showScore() {
  const correct = answers.filter((a, i) => a === QUESTIONS[i].ans).length;
  const total = QUESTIONS.length;
  const pct = Math.round((correct / total) * 100);
  const skipped = answers.filter(a => a === null).length;
  const wrong = total - correct - skipped;

  let msg = "";
  if (pct >= 90) msg = "Excelente — dominas los fundamentos de opciones.";
  else if (pct >= 70) msg = "Buen resultado. Repasa los bloques donde fallaste.";
  else if (pct >= 50) msg = "Buen comienzo. Sigue profundizando en los conceptos.";
  else msg = "Sigue practicando. Los fundamentos son la base de todo.";

  document.getElementById("q-container").style.display = "none";
  document.getElementById("nav-row").style.display = "none";
  document.getElementById("review-notice").style.display = "none";

  const shareText = `He completado el test de Fundamentos de Opciones\n\nResultado: ${correct}/${total} correctas (${pct}%)\n\n¿Y tú?`;

  document.getElementById("score-screen").style.display = "block";
  document.getElementById("score-screen").innerHTML = `
    <div class="score-screen">
      <div class="score-hero">
        <div class="score-pct">${pct}%</div>
        <div class="score-msg">${msg}</div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-val val-green">${correct}</div><div class="stat-lbl">Correctas</div></div>
          <div class="stat-card"><div class="stat-val val-red">${wrong}</div><div class="stat-lbl">Incorrectas</div></div>
          <div class="stat-card"><div class="stat-val">${skipped}</div><div class="stat-lbl">Sin responder</div></div>
        </div>
        <div class="score-actions">
          <button class="btn primary" onclick="retryQuiz()">Reintentar</button>
          <button class="btn" onclick="reviewAnswers()">Revisar respuestas</button>
        </div>
      </div>
      <div class="share-box">
        <span style="flex:1">Comparte tu resultado</span>
        <button class="copy-btn" id="copy-btn" onclick="copyResult('${shareText.replace(/'/g,"\\'")}')">Copiar resultado</button>
      </div>
    </div>`;
}

function retryQuiz() {
  current = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  reviewMode = false;
  document.getElementById("q-container").style.display = "block";
  document.getElementById("nav-row").style.display = "flex";
  document.getElementById("score-screen").style.display = "none";
  render();
}

function reviewAnswers() {
  current = 0;
  reviewMode = true;
  document.getElementById("q-container").style.display = "block";
  document.getElementById("nav-row").style.display = "flex";
  document.getElementById("score-screen").style.display = "none";
  render();
}

function copyResult(text) {
  const decoded = text.replace(/\\n/g, "\n").replace(/\\'/g, "'");
  navigator.clipboard.writeText(decoded).then(() => {
    const btn = document.getElementById("copy-btn");
    if (btn) { btn.textContent = "¡Copiado!"; setTimeout(() => btn.textContent = "Copiar resultado", 2000); }
  });
}

render();
</script>
</body>
</html>
